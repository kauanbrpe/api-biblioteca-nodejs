services:
  - type: web
    name: api-biblioteca
    env: node
    plan: free
    buildCommand: npm install && npm run dist
    startCommand: npm run start:dist
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: NODE_ENV
        value: production